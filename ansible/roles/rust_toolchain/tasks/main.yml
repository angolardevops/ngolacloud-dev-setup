---
# =============================================================================
# Role: rust_toolchain
# =============================================================================
# Ensures `rustup` is installed user-scoped (NOT system-wide — rustup
# manages its own toolchains and updates), adds the components needed
# for typical NgolaCloud CLI work, installs sccache + mold, and writes
# ~/.cargo/config.toml so cargo uses them automatically.
#
# Idempotent. `rustup default <ver>` only runs if the active toolchain
# doesn't already match the pinned version.
# =============================================================================

- name: Rust — apt prereqs (clang for some -sys crates, llvm for mold)
  ansible.builtin.apt:
    name:
      - build-essential
      - pkg-config
      - libssl-dev
      - clang
      - llvm
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [rust]

# ── rustup ────────────────────────────────────────────────────────────────
- name: Rustup — check user install
  ansible.builtin.stat:
    path: "{{ invoking_user_home }}/.cargo/bin/rustup"
  register: rustup_stat
  become: false
  tags: [rust]

# Use the official installer but pin the exact rustup version so a
# laptop reboot doesn't silently take an upgrade.
- name: Rustup — download official installer
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup-init.sh
    mode: '0755'
    force: false
  when: not rustup_stat.stat.exists
  tags: [rust]

- name: Rustup — install (user, no PATH modification)
  ansible.builtin.shell: |
    /tmp/rustup-init.sh -y --no-modify-path --default-toolchain {{ rust_toolchain_version }} --profile minimal
  args:
    creates: "{{ invoking_user_home }}/.cargo/bin/rustup"
  become_user: "{{ invoking_user }}"
  become: true
  when: not rustup_stat.stat.exists
  tags: [rust]

- name: Rustup — ensure default toolchain = {{ rust_toolchain_version }}
  ansible.builtin.shell: |
    {{ invoking_user_home }}/.cargo/bin/rustup default {{ rust_toolchain_version }}
  args:
    executable: /bin/bash
  become_user: "{{ invoking_user }}"
  become: true
  register: rustup_default
  changed_when: "'is up to date' not in rustup_default.stdout"
  tags: [rust]

- name: Rustup — install components (rustfmt, clippy, rust-analyzer, rust-src)
  ansible.builtin.shell: |
    {{ invoking_user_home }}/.cargo/bin/rustup component add {{ item }}
  become_user: "{{ invoking_user }}"
  become: true
  loop:
    - rustfmt
    - clippy
    - rust-analyzer
    - rust-src
  register: rustup_comp
  changed_when: "'is already installed' not in rustup_comp.stdout"
  tags: [rust]

# ── mold linker — 5-10× faster than ld on large workspaces ────────────────
- name: Mold — current version
  ansible.builtin.shell: |
    /usr/local/bin/mold --version 2>/dev/null | awk '{print $2}'
  register: mold_current
  changed_when: false
  failed_when: false
  tags: [rust]

- name: Mold — apt install fallback (Ubuntu 24.04 ships mold)
  ansible.builtin.apt:
    name: mold
    state: present
  when: mold_current.stdout == ''
  tags: [rust]

# ── sccache — cache compiler outputs across cargo invocations ─────────────
- name: Sccache — current version
  ansible.builtin.shell: |
    /usr/local/bin/sccache --version 2>/dev/null | awk '{print $2}'
  register: sccache_current
  changed_when: false
  failed_when: false
  tags: [rust]

- name: Sccache — download tarball
  ansible.builtin.get_url:
    url: "https://github.com/mozilla/sccache/releases/download/v{{ sccache_version }}/sccache-v{{ sccache_version }}-x86_64-unknown-linux-musl.tar.gz"
    dest: "/tmp/sccache-v{{ sccache_version }}.tar.gz"
    mode: '0644'
  when: sccache_current.stdout != sccache_version
  tags: [rust]

- name: Sccache — extract binary
  ansible.builtin.unarchive:
    src: "/tmp/sccache-v{{ sccache_version }}.tar.gz"
    dest: /usr/local/bin/
    remote_src: true
    extra_opts: ['--strip-components=1', '--no-anchored', 'sccache']
    mode: '0755'
    owner: root
    group: root
  when: sccache_current.stdout != sccache_version
  tags: [rust]

# ── cargo global config — wire up sccache + mold + parallel jobs ──────────
- name: Cargo — config directory
  ansible.builtin.file:
    path: "{{ invoking_user_home }}/.cargo"
    state: directory
    mode: '0755'
    owner: "{{ invoking_user }}"
    group: "{{ invoking_user }}"
  tags: [rust]

- name: Cargo — write ~/.cargo/config.toml
  ansible.builtin.copy:
    dest: "{{ invoking_user_home }}/.cargo/config.toml"
    mode: '0644'
    owner: "{{ invoking_user }}"
    group: "{{ invoking_user }}"
    content: |
      # Generated by ngolacloud-dev-setup — re-run `make setup TAGS=rust` to update.
      # ──────────────────────────────────────────────────────────────────────
      [build]
      # sccache transparently caches compiler outputs across runs.
      rustc-wrapper = "/usr/local/bin/sccache"
      # Parallel jobs — leave 4 cores for the system.
      jobs = 16

      [target.x86_64-unknown-linux-gnu]
      # mold is 5-10× faster than ld for large workspaces (ngolacloud-cli has
      # 30+ crates). The `-fuse-ld=mold` form works with the system clang.
      linker = "clang"
      rustflags = ["-C", "link-arg=-fuse-ld=mold"]

      [net]
      # git-fetch-with-cli avoids gitoxide's TLS bugs on noble.
      git-fetch-with-cli = true
  tags: [rust]

# ── Verify ────────────────────────────────────────────────────────────────
- name: Verify — rustc reports the pinned version
  ansible.builtin.shell: |
    {{ invoking_user_home }}/.cargo/bin/rustc --version
  register: rustc_v
  changed_when: false
  become_user: "{{ invoking_user }}"
  become: true
  tags: [rust, verify]

- name: Verify — sccache --show-stats works
  ansible.builtin.shell: |
    /usr/local/bin/sccache --show-stats >/dev/null 2>&1
  changed_when: false
  tags: [rust, verify]

- name: Verify — print rustc + sccache + mold versions
  ansible.builtin.debug:
    msg:
      - "{{ rustc_v.stdout }}"
      - "sccache OK"
      - "mold {{ mold_current.stdout | default('apt-installed') }}"
  tags: [rust, verify]
