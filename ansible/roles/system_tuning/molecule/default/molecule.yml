---
# =============================================================================
# molecule/default/molecule.yml — system_tuning role test scenario
# =============================================================================
# Spins up a privileged Ubuntu 24.04 container, runs the role inside it,
# then executes the verifier (testinfra) to assert end state.
#
# Privileged is required because the role mutates sysctl, swap, GRUB.
# Some checks are SKIPPED in the container (GRUB update-grub has no
# effect on a container's boot) — see tests/test_default.py.
#
# Run with:
#   cd ansible/roles/system_tuning
#   molecule test                  # full lifecycle (create→converge→verify→destroy)
#   molecule converge              # just create + apply role (iterate locally)
#   molecule verify                # re-run tests against existing instance
# =============================================================================
driver:
  name: docker

platforms:
  - name: noble-systune
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
    capabilities:
      - SYS_ADMIN
      - NET_ADMIN

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        # Match the values pinned in the real inventory.ini so the
        # tests + the real workstation drift in lockstep.
        slice_memory_max_gb: 32
        slice_memory_high_gb: 28
        slice_cpu_weight: 75
        slice_tasks_max: 8192
        swap_file_path: /swapfile
        swap_file_size_gb: 2          # smaller — full 16G fills /tmp
  config_options:
    defaults:
      stdout_callback: yaml

verifier:
  name: testinfra
  directory: tests
  options:
    verbose: true

scenario:
  name: default
  test_sequence:
    - lint
    - destroy
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
