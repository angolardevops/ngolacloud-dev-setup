[ngolacloud_dev]
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[ngolacloud_dev:vars]
# Versions pinned here so re-runs of `make setup` stay reproducible.
# Update one place, not scattered across roles.
docker_version_pin       = 5:29.5.0-1~ubuntu.24.04~noble
kind_version             = 0.30.0
kubectl_version          = 1.34.1
helm_version             = 3.16.3
kustomize_version        = 5.5.0
k9s_version              = 0.32.7
krew_version             = 0.4.4
stern_version            = 1.32.0

# Secret-management tooling (dev_tools role)
sops_version             = 3.13.1

rust_toolchain_version   = stable
sccache_version          = 0.8.2
mold_version             = 2.34.0

# Resource budget — defaults are 50% of total host (RAM + CPU), derived
# at play-time from `ansible_memtotal_mb` and `ansible_processor_vcpus`
# in `roles/resource_slicing/defaults/main.yml`. The pre-v1.3.0 pinned
# values are kept below, COMMENTED, as a recipe for forcing a fixed
# budget on a lab-only machine or a non-standard host. Uncomment only
# the lines you want to override.
#
# slice_memory_max_gb      = 32     # default: 50% of total RAM
# slice_memory_high_gb     = 28     # default: 45% of total RAM
# slice_cpu_quota_pct      = 1000   # default: 50% × vcpus (e.g. 1000 on 20-core)
# slice_cpu_weight         = 100    # default: 100 (equal weight)
# slice_tasks_max          = 8192   # default: 8192 (fork-bomb guard)

swap_file_path           = /swapfile
swap_file_size_gb        = 16

# Docker IP pool — 172.30.0.0/16 avoids the common Wi-Fi/corporate
# ranges (192.168.x, 172.16-21.x).
docker_address_pool_base = 172.30.0.0/16
docker_address_pool_size = 24
