[defaults]
inventory          = inventory.ini
roles_path         = roles
host_key_checking  = False
forks              = 1
gathering          = smart
fact_caching       = jsonfile
fact_caching_connection = .ansible_facts_cache
fact_caching_timeout = 3600
# Default stays `default` so a manual `ansible-playbook setup.yml` looks
# the way it always did. The Rust CLI flips this to `ngolacloud_stream`
# (via ANSIBLE_STDOUT_CALLBACK env var) to get JSON-line events parsed
# into an indicatif progress bar — see ADR-0015 in docs/adr/.
stdout_callback    = default
callback_plugins   = callback_plugins
bin_ansible_callbacks = True
nocows             = 1
retry_files_enabled = False
interpreter_python = /usr/bin/python3

[privilege_escalation]
become             = True
become_method      = sudo
become_ask_pass    = False

[ssh_connection]
pipelining         = True
