---
# =============================================================================
# .github/workflows/smoke.yml — end-to-end smoke test on a fresh runner
# =============================================================================
# Spins up a fresh ubuntu-24.04 runner, runs the full happy path
# (validate → setup dry-run → kind-up → minimal workload), and fails
# the workflow if anything regresses.
#
# Distinct from .github/workflows/lint.yml (which only lint-checks the
# YAML/shell) and trivy.yml (which scans for CVEs) — this is the only
# workflow that actually EXERCISES the playbook end-to-end.
#
# Runtime: ~12-15 min. Triggered on:
#   - manual dispatch
#   - weekly (Wed 04:00 UTC)
#   - changes to ansible/, kind/, scripts/, Makefile
# =============================================================================
name: smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 3'    # Wednesday 04:00 UTC
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'kind/**'
      - 'scripts/**'
      - 'Makefile'

permissions:
  contents: read

jobs:
  smoke:
    name: validate → setup-check → kind-up → minimal workload
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runtime prereqs
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible make curl
          ansible-galaxy collection install community.general ansible.posix

      # ── Phase 1: preflight (validate-host.sh) ─────────────────────────
      - name: validate-host (allow warnings, fail on hard errors)
        run: |
          # Exit 0=ready, 1=warn (OK for CI), 2=fail (block)
          ./scripts/validate-host.sh || rc=$?
          if [ "${rc:-0}" = "2" ]; then
            echo "::error::validate-host returned 2 (hard fail)"
            exit 1
          fi

      # ── Phase 2: ansible dry-run (--check --diff) ─────────────────────
      - name: setup-check (ansible dry-run, no changes)
        run: make setup-check

      # ── Phase 3: kind-up (Docker on GHA is already configured) ────────
      - name: install kind
        uses: helm/kind-action@v1
        with:
          version: v0.30.0
          cluster_name: ngolacloud-dev
          config: kind/cluster-dev.yaml
          wait: 3m

      - name: install Cilium
        run: |
          set -euo pipefail
          helm repo add cilium https://helm.cilium.io/
          helm install cilium cilium/cilium --version 1.16.0 \
            --namespace kube-system \
            --values kind/cilium-values.yaml \
            --wait --timeout 5m
          kubectl -n kube-system wait --for=condition=Ready pod \
            -l k8s-app=cilium --timeout=120s

      # ── Phase 4: deploy a tiny canary, prove it Runs ─────────────────
      - name: deploy + assert nginx canary
        run: |
          set -euo pipefail
          kubectl create deploy smoke-canary --image=nginx:1.27-alpine --replicas=2
          kubectl wait --for=condition=Available deploy/smoke-canary --timeout=120s
          kubectl get pods -l app=smoke-canary -o wide
          # Hit the canary through a Service to exercise Cilium kube-proxy replacement
          kubectl expose deploy smoke-canary --port=80 --type=ClusterIP
          # Run a busybox client inside the cluster to curl the service
          kubectl run smoke-client --rm -i --image=busybox:1.36 \
            --restart=Never --command -- \
            wget -q -O- http://smoke-canary | head -1

      # ── Phase 5: prove health-check runs and exit codes are sane ─────
      - name: health-check
        run: |
          ./scripts/health-check.sh || rc=$?
          # health-check returns 1 if any check is in WARN — fine in CI
          if [ "${rc:-0}" -gt 1 ]; then
            echo "::error::health-check failed hard (rc=$rc)"
            exit 1
          fi

      # ── Phase 6: leave the cluster up briefly so reviewers can see logs
      - name: collect diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide
          kubectl -n kube-system logs -l k8s-app=cilium --tail=50 || true
          kubectl describe nodes | head -100
