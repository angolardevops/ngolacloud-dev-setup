---
# =============================================================================
# k8s/security/kube-bench.yaml — CIS Kubernetes Benchmark one-shot Job
# =============================================================================
# Runs kube-bench (Aqua Security) against the cluster, producing a YAML
# report on stdout (kubectl logs job/kube-bench).
#
# Use case: scheduled audit before any prod-bound change. Outputs the
# CIS-recommended posture vs. the cluster's reality — useful as a
# trend metric over time.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: security
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kube-bench
  namespace: security
spec:
  ttlSecondsAfterFinished: 3600     # auto-delete the job 1h after completion
  template:
    metadata:
      labels:
        app: kube-bench
    spec:
      restartPolicy: Never
      hostPID: true                  # required to probe /proc on the node
      containers:
        - name: kube-bench
          image: aquasec/kube-bench:v0.10.7
          command: ["kube-bench"]
          args:
            - "run"
            - "--targets"
            - "node,policies,managedservices"  # skip master (Kind doesn't expose it)
            - "--noresults=false"
            - "--include-test-output=true"
          volumeMounts:
            - name: var-lib-etcd
              mountPath: /var/lib/etcd
              readOnly: true
            - name: var-lib-kubelet
              mountPath: /var/lib/kubelet
              readOnly: true
            - name: var-lib-kube-scheduler
              mountPath: /var/lib/kube-scheduler
              readOnly: true
            - name: var-lib-kube-controller-manager
              mountPath: /var/lib/kube-controller-manager
              readOnly: true
            - name: etc-systemd
              mountPath: /etc/systemd
              readOnly: true
            - name: lib-systemd
              mountPath: /lib/systemd
              readOnly: true
            - name: srv-kubernetes
              mountPath: /srv/kubernetes
              readOnly: true
            - name: etc-kubernetes
              mountPath: /etc/kubernetes
              readOnly: true
            - name: usr-bin
              mountPath: /usr/local/mount-from-host/bin
              readOnly: true
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits:   {cpu: "500m", memory: "512Mi"}
      volumes:
        - name: var-lib-etcd
          hostPath: {path: /var/lib/etcd}
        - name: var-lib-kubelet
          hostPath: {path: /var/lib/kubelet}
        - name: var-lib-kube-scheduler
          hostPath: {path: /var/lib/kube-scheduler}
        - name: var-lib-kube-controller-manager
          hostPath: {path: /var/lib/kube-controller-manager}
        - name: etc-systemd
          hostPath: {path: /etc/systemd}
        - name: lib-systemd
          hostPath: {path: /lib/systemd}
        - name: srv-kubernetes
          hostPath: {path: /srv/kubernetes}
        - name: etc-kubernetes
          hostPath: {path: /etc/kubernetes}
        - name: usr-bin
          hostPath: {path: /usr/bin}
