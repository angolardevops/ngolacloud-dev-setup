# =============================================================================
# k8s/security/falco-values.yaml — Helm values for Falco on Kind
# =============================================================================
# Runtime threat detection — flags anomalous behaviour INSIDE containers
# (shell in container, write to /etc, suid binary executions, sensitive
# file reads, network anomalies).
#
# Driver choice:
#   • modern_ebpf  — preferred. Works on kernel 5.8+ via CO-RE. Kind on
#                    a 6.x host (this workstation) supports it.
#   • ebpf         — fallback, requires kernel headers
#   • kmod         — needs to compile kernel module against host headers
#                    (failure-prone on Kind because /lib/modules isn't
#                    mounted)
#
# Output: falcosidekick (separate sub-chart) routes alerts to Slack/Loki/
# stdout. We keep it stdout-only for the lab.
# =============================================================================
driver:
  enabled: true
  kind: modern_ebpf
  # modern_ebpf needs the host kernel — Kind nodes inherit this from the
  # workstation kernel via Docker.

falcoctl:
  artifact:
    install:
      enabled: true
    follow:
      enabled: true     # auto-pull updated rule packs every hour
  config:
    artifact:
      install:
        # Pre-install the official rules + k8s_audit rules.
        refs:
          - falco-rules:3
          - k8saudit-rules:0
      follow:
        refs:
          - falco-rules:3
          - k8saudit-rules:0

# Lab-friendly tuning: single replica per node, no Prometheus exporter
# (the kube-prom-stack will pick up Falco's own /metrics endpoint).
falco:
  json_output: true
  log_level: info
  rules_files:
    - /etc/falco/falco_rules.yaml
    - /etc/falco/falco_rules.local.yaml      # our additions, see below
    - /etc/falco/rules.d
  # Stdout — falcosidekick + Loki for prod, plain stderr is enough here.
  stdout_output:
    enabled: true
    keep_alive: true
  http_output:
    enabled: false      # turn on when falcosidekick is plumbed in

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# Falcosidekick — alert router. Ships Falco alerts to Loki (visible in
# the existing Grafana) AND to stdout (kubectl logs as fallback).
# Loki URL points at the loki-stack service installed by kind-up.sh
# --with-observability; if Loki isn't deployed, falcosidekick falls back
# silently to stdout.
falcosidekick:
  enabled: true
  replicaCount: 1
  config:
    debug: false
    stdout:
      minimumpriority: "warning"
    loki:
      hostport: "http://loki-stack.observability.svc.cluster.local:3100"
      endpoint: "/loki/api/v1/push"
      tenant: "falco"
      minimumpriority: "notice"      # ship everything ≥ notice to Loki
      checkcert: false
      extralabels: "source,priority,rule"

# Don't run on the control plane (Kind's CP is a thin container).
nodeSelector:
  kubernetes.io/hostname: ""    # placeholder — overridden via tolerations below

tolerations:
  - effect: NoSchedule
    operator: Exists

# ── Custom rule file (rendered into a ConfigMap by the chart) ────────────
customRules:
  ngolacloud-dev.local.yaml: |
    # ngolacloud-dev local rule overlay
    # Disable noisy rules that fire on benign Kind activity.
    - rule: Read sensitive file untrusted
      override:
        exceptions: append
      exceptions:
        - name: kindest_node_baseline
          fields: [container.image.repository]
          values:
            - "kindest/node"
            - "docker.io/kindest/node"

    # Custom rule: any process spawning `nc -lvp …` in a workload pod
    # is almost certainly malicious — flag immediately.
    - rule: Suspicious netcat listener
      desc: A workload container started netcat in listen mode
      condition: >
        evt.type = execve and
        proc.name = "nc" and
        (proc.args contains "-l" or proc.args contains "-lvp") and
        container.id != host and
        not k8s.ns.name in (kube-system, cilium-system)
      output: >
        Netcat listener started in container (user=%user.name
        proc=%proc.name args=%proc.args container=%container.name
        image=%container.image.repository pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: critical
      tags: [network, suspicious]
