{{- if .Values.externalSecrets.enabled -}}
{{- /*
   When ESO is installed (`make eso-with-vault`), this CR makes the
   portal pick up secrets from Vault via the ClusterSecretStore. Without
   ESO this template renders nothing and the deployment uses static
   env vars (or fails — that's by design).
*/}}
{{- range .Values.externalSecrets.vault.secrets }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .target }}
  labels:
    {{- include "portal.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.externalSecrets.vault.secretStore }}
  target:
    name: {{ .target }}
    creationPolicy: Owner
  data:
    {{- range .data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        property: {{ .property }}
    {{- end }}
---
{{- end }}
{{- end -}}
