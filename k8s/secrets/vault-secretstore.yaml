---
# =============================================================================
# k8s/secrets/vault-secretstore.yaml — ClusterSecretStore pointing at Vault
# =============================================================================
# Tells External Secrets Operator HOW to talk to Vault. Pre-condition:
# a Vault server running somewhere reachable from the cluster (defaults
# to the in-cluster Vault dev-mode service installed via
# `scripts/eso-install.sh --with-vault`).
#
# Auth method: kubernetes (ServiceAccount JWT). The cluster mounts the
# `external-secrets` SA's token, Vault validates it against its TokenReview
# API, and grants a short-lived Vault token scoped to the configured role.
#
# For prod (Hetzner Vault): swap the `server` URL and ensure the Vault
# `kubernetes` auth backend is configured against the prod cluster's CA.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-dev
spec:
  provider:
    vault:
      server: "http://vault.vault-dev.svc.cluster.local:8200"
      path: "secret"            # KV v2 mount path
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"   # Vault auth backend mount
          role: "external-secrets"  # Vault role configured to issue tokens
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
