---
# =============================================================================
# k8s/secrets/sample-externalsecret.yaml — demonstrates Vault → K8s sync
# =============================================================================
# Pre-conditions in Vault (the eso-install.sh --with-vault script does this):
#   1. KV v2 secret at `secret/data/portal/db` with keys `username`, `password`
#   2. Vault policy `external-secrets-policy` granting read on `secret/data/portal/*`
#   3. Vault kubernetes auth role `external-secrets` bound to the policy
#
# After applying this CR, ESO reconciles every refreshInterval (default 1h)
# and writes a K8s Secret named `portal-db-credentials` in the `default`
# namespace. Pods reference it like any other Secret.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: portal-db-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-dev
    kind: ClusterSecretStore
  target:
    name: portal-db-credentials   # K8s Secret name created in this namespace
    creationPolicy: Owner          # ESO owns the lifecycle; deletes the K8s
                                   # Secret when this CR is deleted
  data:
    - secretKey: db-username
      remoteRef:
        key: portal/db
        property: username
    - secretKey: db-password
      remoteRef:
        key: portal/db
        property: password
